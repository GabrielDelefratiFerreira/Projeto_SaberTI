<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style/style.css">
    <title>Cadastro</title>
</head>
<body class="pagina-clientes">
    <div>
        <h1>Cadastro de Clientes</h1>
        <div id="mensagem"></div>
        
        <button type="button" id="botaoNovoCliente">Novo cliente</button>
        <div id="painelCliente">
            <form id="formularioCliente">
                <label for="codigoCliente">Código</label>
                <input type="text" id="codigoCliente" readonly placeholder="Gerado automaticamente.">

                <label for="tipoCliente">Tipo do cliente</label>
                <select id="tipoCliente">
                    <option value="">Selecione</option>
                    <option value="F">Pessoa Física</option>
                    <option value="J">Pessoa Jurídica</option>
                </select>

                <label for="cpfCnpjCliente">CPF/CNPJ</label>
                <input type="text" id="cpfCnpjCliente" placeholder="Digite seu CPF/CNPJ">

                <label for="nomeCliente">Nome cliente</label>
                <input type="text" id="nomeCliente" placeholder="Digite o nome do cliente">

                <button type="submit" id="botaoSalvar">Cadastrar</button>

                <button type="button" id="botaoCancelarEdicao" class="btn-cancelar" style="display:none">Cancelar cadastro</button>
            </form>
        </div>
        <a href="../menu/home.html" id="voltar">
            <button class="botao-cinza">Voltar</button>
        </a>

        <div id="secaoListagemClientes">
            <h2>Clientes cadastrados</h2>

            <div class="containerPesquisa">
                <div class="linhaPesquisa">
                    <div class="colunaInput">
                        <label for="pesquisaCodigo">Código</label>
                        <input type="number" id="pesquisaCodigo" placeholder="Ex: 5">
                    </div>

                    <div class="colunaInput">
                        <label for="pesquisaTipo">Tipo</label>
                        <select id="pesquisaTipo">
                            <option value="">Selecione</option>
                            <option value="F">Pessoa Física</option>
                            <option value="J">Pessoa Jurídica</option>
                        </select>
                    </div>

                    <div class="colunaInput" style="flex: 2;"> 
                        <label for="pesquisaNome">Nome</label>
                        <input type="text" id="pesquisaNome" placeholder="Digite o nome do cliente...">
                    </div>
                    <button type="button" id="btnPesquisarFiltros" class="btn-pesquisar">Pesquisar</button>
                </div>
            </div>
            <table>
                    <thead>
                            <tr>
                            <th>Código</th>
                            <th>Tipo</th>
                            <th>CPF/CNPJ</th>
                            <th>Nome</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                <tbody id="corpoTabelaClientes"></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../conexaoSupaBase/conexao.js"></script>
    <script src="clientes.js"></script>

</body>
</html>
