<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style/style.css">
    <title>Orçamentos</title>
</head>
<body class="pagina-orcamentos">
    <div>
        <h1>Cadastro de Orçamentos</h1>

        <button type="button" id="botaoNovoOrcamento">Novo orçamento</button>

        <div id="mensagem"></div>
        <div id="painelFormulario">
            <form id="formularioOrcamento">

                <label for="codigoOrcamento">Código do orçamento</label>
                <input type="text" id="codigoOrcamento" readonly>

                <label for="clienteOrcamento">Cliente selecionado</label>
                <select id="clienteOrcamento">
                    <option value="">Selecione um cliente</option>
                </select>

                <label for="dataOrcamento">Data do orçamento</label>
                <input type="date" id="dataOrcamento">

                <label for="dataValidadeOrcamento">Data de validade</label>
                <input type="date" id="dataValidadeOrcamento">

                <label for="valorTotalOrcamento">Valor total calculado</label>
                <input type="number" id="valorTotalOrcamento" step="0.01" readonly>

                <h2>Itens do orçamento</h2>

                <label for="produtoItemOrcamento">Produto</label>
                <select id="produtoItemOrcamento">
                    <option value="">Selecione um produto</option>
                </select>

                <label for="descricaoProdutoItemOrcamento">Descrição do produto</label>
                <input type="text" id="descricaoProdutoItemOrcamento" readonly>

                <label for="quantidadeItemOrcamento">Quantidade</label>
                <input type="number" id="quantidadeItemOrcamento" min="1" step="1">

                <label for="valorUnitarioItemOrcamento">Valor unitário</label>
                <input type="number" id="valorUnitarioItemOrcamento" step="0.01" readonly>

                <label for="valorTotalItemOrcamento">Valor total do item</label>
                <input type="number" id="valorTotalItemOrcamento" step="0.01" readonly>

                <button type="button" id="botaoAdicionarItem">
                    Adicionar item
                </button>

                <button type="submit" id="botaoSalvar">
                    Cadastrar
                </button>

                <button type="button" id="botaoCancelarEdicao" class="btn-cancelar">
                    Cancelar edição
                </button>

            </form>

            <div>
                <h2>Itens adicionados</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>Descrição</th>
                            <th>Quantidade</th>
                            <th>Valor unitário</th>
                            <th>Valor total</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabelaItensOrcamento"></tbody>
                </table>
            </div>
        </div>

        <a href="../menu/home.html" id="voltar">
            <button class="botao-cinza">Voltar</button>
        </a>

        <div>
            <h2>Orçamentos cadastrados</h2>
            <table>
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Cliente</th>
                        <th>Data orçamento</th>
                        <th>Data validade</th>
                        <th>Valor total</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoTabelaOrcamentos"></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="orcamento.js"></script>

</body>
</html>
