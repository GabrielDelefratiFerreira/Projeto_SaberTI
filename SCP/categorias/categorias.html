<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style/style.css">
    <title>Categorias</title>
</head>
<body class="pagina-categorias">
    <div>
        <h1>Cadastro de Categorias</h1>

        <button type="button" id="botaoNovaCategoria">Nova categoria</button>

        <div id="mensagem"></div>
        
        <div id="painelCategoria" display="none">
            <form id="formularioCategoria">
                <label for="codigoCategoria">Código Categoria</label>
                <input type="text" id="codigoCategoria" placeholder="Gerado automaticamente." readonly>

                <label for="descricaoCategoria">Descrição</label>
                <input type="text" id="descricaoCategoria" placeholder="Digite a descrição da categoria">

                <button type="submit" id="botaoSalvar">Cadastrar</button>

                <button type="button" id="botaoCancelarEdicao" style="display:none">Cancelar edição</button>
            </form>
        </div>

        <a href="../menu/home.html" id="voltar">
            <button class="botao-cinza">Voltar</button>
        </a>

            <div id="secaoListagemCategorias">
                <h2>Categorias cadastradas</h2>
                <div class="containerPesquisa">
                    <div class="linhaPesquisa">
                        <div class="colunaInput">
                            <label for="pesquisaCodigo">Código</label>
                            <input type="number" id="pesquisaCodigo" placeholder="Ex: 3">
                        </div>

                        <div class="colunaInput coluna-input-larga"> 
                            <label for="pesquisaDescricao">Descrição</label>
                            <input type="text" id="pesquisaDescricao" placeholder="Digite o nome ou descrição...">
                        </div>
                        
                        <button type="button" id="btnPesquisarFiltros" class="btn-pesquisar">Pesquisar</button>
                    </div>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Descrição</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabelaCategorias"></tbody>
                </table>
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../conexaoSupaBase/conexao.js"></script>
    <script src="categorias.js"></script>

</body>
</html>
