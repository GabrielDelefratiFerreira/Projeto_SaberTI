<!DOCTYPE html>
<html lang="pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cadastro</title>
</head>
<body class="pagina-clientes">
    <div>
        <h1>Cadastro de Clientes</h1>

        <label for="">Código</label>
        <input type="text">
        <label for="">Tipo do cliente</label>
        <input type="text" placeholder="Física/Jurídica">
        <label for="">CPF/CNPJ</label>
        <input type="text" placeholder="Digite seu CPF/CNPJ.">
        <label for="">Nome cliente</label>
        <input type="text" placeholder="Digite o nome do cliente.">

        <button>Cadastrar</button>

        <a href="home.html">
            <button class="botao-cinza">Voltar</button>
        </a>

        <div>
            <h2>Clientes cadastros</h2>
            <table>
                <thead>
                    <tr>
                        <th>Código do cliente</th>
                        <th>Tipo do cliente</th>
                        <th>Tipo pessoa</th>
                        <th>Nome</th>
                    </tr>
                </thead>
                <tbody>
                    
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="clientes.js"></script>

</body>
</html>
